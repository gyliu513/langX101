---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-sim-decode
  namespace: llm-d-demo
  labels:
    app: llm-d-sim-decode
    llm-d.ai/role: decode
    app.kubernetes.io/part-of: llm-d
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-d-sim-decode
  template:
    metadata:
      labels:
        app: llm-d-sim-decode
        llm-d.ai/role: decode
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.0-arm64
        imagePullPolicy: IfNotPresent
        args:
        - "--model=Qwen/Qwen2.5-0.5B-Instruct"
        - "--port=8000"
        - "--kv-cache-size=4096"
        - "--block-size=16"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-decode-svc
  namespace: llm-d-demo
  labels:
    app: llm-d-sim-decode
    llm-d.ai/role: decode
spec:
  selector:
    app: llm-d-sim-decode
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  type: ClusterIP
