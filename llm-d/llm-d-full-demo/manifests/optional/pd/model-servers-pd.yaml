---
# P/D model servers (illustrative on no-GPU sim — see optional/README.md).
# A prefill pool and a decode pool, both labeled llm-d.ai/guide=pd-disaggregation
# so the pd-router.values.yaml InferencePool selects them. The decode pods front
# the sim with the llm-d-routing-sidecar (entry :8000 -> sim :8200), which
# coordinates the remote-prefill handshake with a prefill pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-prefill
  namespace: llm-d
  labels:
    app: pd-prefill
    llm-d.ai/role: prefill
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/model: Qwen2.5-0.5B-Instruct
    app.kubernetes.io/part-of: llm-d
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pd-prefill
      llm-d.ai/guide: pd-disaggregation
  template:
    metadata:
      labels:
        app: pd-prefill
        llm-d.ai/role: prefill
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/model: Qwen2.5-0.5B-Instruct
    spec:
      containers:
        - name: modelserver
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.0-arm64  # x86_64: drop -arm64
          imagePullPolicy: IfNotPresent
          args:
            - "--model=Qwen/Qwen2.5-0.5B-Instruct"
            - "--port=8000"
            - "--kv-cache-size=4096"
            - "--block-size=16"
            - "--enable-kvcache"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OTEL_SERVICE_NAME
              value: "llm-d-model-server-prefill"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
          ports:
            - name: modelserver
              containerPort: 8000
              protocol: TCP
            - name: nixl
              containerPort: 5600
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-decode
  namespace: llm-d
  labels:
    app: pd-decode
    llm-d.ai/role: decode
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/model: Qwen2.5-0.5B-Instruct
    app.kubernetes.io/part-of: llm-d
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pd-decode
      llm-d.ai/guide: pd-disaggregation
  template:
    metadata:
      labels:
        app: pd-decode
        llm-d.ai/role: decode
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/model: Qwen2.5-0.5B-Instruct
    spec:
      initContainers:
        # Native sidecar (restartPolicy: Always). Entry on :8000; proxies to the
        # sim on :8200 and drives the remote-prefill handshake via x-prefiller-url.
        - name: routing-proxy
          image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-log-level=1
            - --secure-proxy=false
          ports:
            - name: sidecar
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
      containers:
        - name: modelserver
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.0-arm64  # x86_64: drop -arm64
          imagePullPolicy: IfNotPresent
          args:
            - "--model=Qwen/Qwen2.5-0.5B-Instruct"
            - "--port=8200"
            - "--kv-cache-size=4096"
            - "--block-size=16"
            - "--enable-kvcache"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OTEL_SERVICE_NAME
              value: "llm-d-model-server-decode"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
          ports:
            - name: modelserver
              containerPort: 8200
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
