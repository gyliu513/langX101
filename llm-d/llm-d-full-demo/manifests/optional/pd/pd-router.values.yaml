## EPP P/D scheduling config for the prefill/decode pools.
## Layer this onto the helm install INSTEAD OF optimized-baseline.values.yaml:
##
##   helm install llm-d oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev \
##     -f guides/recipes/router/base.values.yaml \
##     -f manifests/optional/pd/pd-router.values.yaml \
##     -f guides/recipes/router/features/monitoring.values.yaml \
##     -f helm-values/kind-overrides.values.yaml \
##     -f helm-values/tracing.values.yaml \
##     -f helm-values/proxy-tracing-ipp.values.yaml \
##     -n llm-d --version v0
##
## Derived from guides/pd-disaggregation/router/pd-disaggregation.values.yaml.
router:
  epp:
    pluginsConfigFile: "pd-config.yaml"
    pluginsCustomConfig:
      pd-config.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: disagg-headers-handler
        - type: always-disagg-pd-decider
        - type: disagg-profile-handler
          parameters:
            deciderPluginName: always-disagg-pd-decider
        - type: prefill-filter
        - type: decode-filter
        - type: prefix-cache-scorer
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: active-request-scorer
        schedulingProfiles:
        - name: prefill
          plugins:
          - pluginRef: prefill-filter
          - pluginRef: prefix-cache-scorer
            weight: 3
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
        - name: decode
          plugins:
          - pluginRef: decode-filter
          - pluginRef: active-request-scorer
            weight: 2
          - pluginRef: prefix-cache-scorer
            weight: 3

  modelServers:
    matchLabels:
      llm-d.ai/guide: "pd-disaggregation"
