---
# PodMonitor for Prometheus to scrape inference-sim (model server) metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: llm-d-model-servers
  namespace: llm-d
  labels:
    app.kubernetes.io/part-of: llm-d
spec:
  selector:
    matchLabels:
      llm-d.ai/guide: optimized-baseline
  podMetricsEndpoints:
  - port: modelserver
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
