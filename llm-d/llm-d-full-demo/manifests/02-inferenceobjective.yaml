---
# InferenceObjective defines scheduling priority for requests in the pool.
# Uses llm-d.ai/v1alpha2 (llm-d's own API group, migrated from inference.networking.x-k8s.io/v1alpha2).
# CRD is installed via: kubectl apply -k "https://github.com/llm-d/llm-d-router/config/crd"
# InferencePool name = helm release name = "llm-d"
apiVersion: llm-d.ai/v1alpha2
kind: InferenceObjective
metadata:
  name: llm-d-standard
  namespace: llm-d
  labels:
    app.kubernetes.io/part-of: llm-d
spec:
  poolRef:
    name: llm-d
  priority: 0
