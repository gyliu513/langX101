apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: multikueue-demo
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  replicatedJobs:
  - name: workers
    replicas: 1
    template:
      spec:
        parallelism: 2
        completions: 2
        backoffLimit: 0
        template:
          spec:
            restartPolicy: Never
            containers:
            - name: worker
              image: busybox:1.36
              command: ["sh", "-c", "echo \"[$(hostname)] running on MultiKueue worker\"; sleep 40; echo done"]
              resources:
                requests:
                  cpu: "500m"
                  memory: "200Mi"
