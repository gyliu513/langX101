---
# JobSet controller in kubeflow-system - labels must match the webhook Service selector
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: jobset
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: jobset
    control-plane: controller-manager
  name: jobset-controller-manager
  namespace: kubeflow-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: jobset
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: jobset
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: jobset
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: jobset
        control-plane: controller-manager
    spec:
      containers:
        - name: manager
          image: registry.k8s.io/jobset/jobset:v0.8.0
          command: ["/manager"]
          args:
            - --config=/controller_manager_config.yaml
            - --zap-log-level=2
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /controller_manager_config.yaml
              name: manager-config
              subPath: controller_manager_config.yaml
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: jobset-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
        - configMap:
            name: jobset-manager-config
          name: manager-config
        - name: cert
          secret:
            defaultMode: 420
            secretName: jobset-webhook-server-cert
