apiVersion: batch/v1
kind: Job
metadata:
  name: low-priority-gang
  namespace: cohort-preemption-demo
  labels:
    kueue.x-k8s.io/queue-name: lq-low    # 使用 cq-low 队列
spec:
  parallelism: 6          # gang：6 个 pod 必须同时 admit（3 nominal + 3 borrowed）
  completions: 6
  suspend: true
  template:
    metadata:
      labels:
        app: low-priority-gang
    spec:
      priorityClassName: low-priority     # PriorityClass=100，可被抢占
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "echo 'LOW-PRIORITY pod $(hostname) started'; sleep 300"]
          resources:
            requests:
              cpu: "1"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
