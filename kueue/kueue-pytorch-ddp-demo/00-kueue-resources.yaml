---
# ResourceFlavor: CPU 节点资源类型
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: default-cpu
spec: {}
---
# ClusterQueue: 配额 8 CPU / 16Gi Memory
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: pytorch-cluster-queue
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: default-cpu
          resources:
            - name: cpu
              nominalQuota: "8"
            - name: memory
              nominalQuota: "16Gi"
---
# LocalQueue: namespace 级别入口
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: pytorch-user-queue
  namespace: default
spec:
  clusterQueue: pytorch-cluster-queue
