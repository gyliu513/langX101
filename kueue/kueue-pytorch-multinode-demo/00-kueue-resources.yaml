---
# ResourceFlavor: empty spec for CPU demo
# For GPU production, add nodeLabels for GPU nodes, e.g.: nodeLabels: {nvidia.com/gpu.present: "true"}
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: default-flavor
spec: {}
---
# ClusterQueue: quota for CPU demo
# For GPU production, add "nvidia.com/gpu" to coveredResources and set nominalQuota to 4
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: multinode-cluster-queue
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: default-flavor
          resources:
            - name: cpu
              nominalQuota: "8"
            - name: memory
              nominalQuota: "16Gi"
---
# LocalQueue
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: multinode-user-queue
  namespace: default
spec:
  clusterQueue: multinode-cluster-queue
